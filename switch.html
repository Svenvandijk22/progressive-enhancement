<!doctype html>
<html lang="nl">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width">
		<title>Switch control / Progressive Enhancement / FDND</title>
		<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
		<link href="assets/styles.css" rel="stylesheet">
		<style>
html{
	color-scheme: light dark;
}

label{
display: flex;
align-items: center;
gap: .5em;
}
input:focus{

	outline-color: aqua ;
}
input{

--width:8em;
--height:5em;
--radius:1.5em;
--padding:.3em;
--radius:1.5em;
appearance: none;
width: var(--width);
height:var(--height) ;

--of-color:red;
--on-color:limegreen;

background-image: linear-gradient(to right, var(--on-color) 50% , var(--of-color) 50% );
background-size: 200% 100%;
background-position: right;


background-color: var(--of-color);
border-radius: 1em;

@media (prefers-reduced-motion:reduce ){

	transition: 0.5s;
}

			/* Schrijf hier gewoon je CSS voor dit component */

			/* Hint: Dit component kun je volledig met HTML en CSS bouwen */

			/* Hint: Hoe ver ga je qua styling? Vraag jezelf dit altijd af */
		</style>
	</head>
	<body>
		<h1>Switch control</h1>
		<label for="switchinput">

			 ik ben een switch
		</label>
		<input id="switchinput"
		 type="checkbox" switch>
		
		<!-- Hint: Safari heeft hiervoor iets bedacht, maar is dat al een standaard?
